version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: vaidya_vihar_db
    environment:
      POSTGRES_DB: vaidya_vihar_db
      POSTGRES_USER: vaidya_user
      POSTGRES_PASSWORD: vaidya_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - vaidya_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaidya_user -d vaidya_vihar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vaidya_vihar_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - vaidya_network
    volumes:
      - redis_data:/data

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vaidya_vihar_backend
    environment:
      - DATABASE_URL=postgresql://vaidya_user:vaidya_password@db:5432/vaidya_vihar_db
      - SECRET_KEY=your-super-secret-jwt-key-change-in-production-vaidyavihar-2026
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - DEBUG=False
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
      - "3000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - vaidya_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vaidya_network:
    driver: bridge
