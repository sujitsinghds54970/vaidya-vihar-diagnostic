name: vaidya-vihar-diagnostic
region: blr
services:
  - name: backend
    github:
      repo: sujitsinghds54970/vaidya-vihar-diagnostic
      branch: master
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
      - path: /docs
    envs:
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: SECRET_KEY
        value: ${SECRET_KEY}
        type: SECRET
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DEBUG
        value: "False"
    health_check:
      http_path: /docs
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
  
  - name: frontend
    github:
      repo: sujitsinghds54970/vaidya-vihar-diagnostic
      branch: master
      deploy_on_push: true
    source_dir: frontend/vaidya-vihar-frontend
    dockerfile_path: frontend/vaidya-vihar-frontend/Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: REACT_APP_API_URL
        value: ${backend.PUBLIC_URL}

databases:
  - name: db
    engine: PG
    version: "15"
    production: false
    cluster_name: vaidya-vihar-db
