name: vaidya-vihar-diagnostic
region: blr

services:
  # Backend API Service
  - name: backend
    github:
      repo: sujitsinghds54970/vaidya-vihar-diagnostic
      branch: master
      deploy_on_push: true
    
    # Use buildpack deployment (not Docker)
    build_command: cd backend && pip install -r requirements.txt
    run_command: cd backend && gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080
    
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    
    routes:
      - path: /api
      - path: /docs
      - path: /redoc
    
    envs:
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: SECRET_KEY
        value: vaidya-vihar-secret-key-2024-change-this
        type: SECRET
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DEBUG
        value: "False"
      - key: PYTHONPATH
        value: /workspace/backend
    
    health_check:
      http_path: /docs
      initial_delay_seconds: 60
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
  
  # Frontend Service
  - name: frontend
    github:
      repo: sujitsinghds54970/vaidya-vihar-diagnostic
      branch: master
      deploy_on_push: true
    
    source_dir: frontend/vaidya-vihar-frontend
    build_command: npm install && npm run build
    run_command: npx serve -s build -l 8080
    
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    
    routes:
      - path: /
    
    envs:
      - key: REACT_APP_API_URL
        value: ${backend.PUBLIC_URL}

# Database
databases:
  - name: db
    engine: PG
    version: "15"
    production: false
    cluster_name: vaidya-vihar-db

# Jobs for database initialization
jobs:
  - name: init-db
    github:
      repo: sujitsinghds54970/vaidya-vihar-diagnostic
      branch: master
      deploy_on_push: false
    kind: PRE_DEPLOY
    run_command: cd backend && python3 init_database.py
    envs:
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: SECRET_KEY
        value: vaidya-vihar-secret-key-2024-change-this
        type: SECRET
